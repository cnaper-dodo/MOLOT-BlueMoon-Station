<!DOCTYPE html>
<html>
<head>
<title>Stat Browser</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta http-equiv="Cache-Control" content="max-age=15; must-revalidate" />
<link id="goonStyle" rel="stylesheet" type="text/css" href="browserOutput_white.css" media="all" />
<style>
	body {
		font-family: Verdana, Geneva, Tahoma, sans-serif;
		font-size: 12px !important;
		margin: 0 !important;
		padding: 0 !important;
		overflow-x: hidden;
		overflow-y: auto;
	}

	body.dark {
		background-color: #131313;
		color: #b2c4dd;
	}

	::-webkit-scrollbar {
		width: 12px;
		height: 12px;
	}

	::-webkit-scrollbar-track {
		background: #f0f0f0;
	}

	::-webkit-scrollbar-thumb {
		background: #c0c0c0;
		border: 3px solid #f0f0f0;
		border-radius: 6px;
	}

	::-webkit-scrollbar-thumb:hover {
		background: #a0a0a0;
	}

	body.dark::-webkit-scrollbar-track {
		background: #131313;
	}

	body.dark::-webkit-scrollbar-thumb {
		background: #333333;
		border: 3px solid #131313;
	}

	body.dark::-webkit-scrollbar-thumb:hover {
		background: #555555;
	}

	#menu {
		background-color: #F0F0F0;
		position: fixed;
		width: 100%;
		z-index: 100;
	}

	.dark #menu {
		background-color: #202020;
	}

	#statcontent {
		padding: 7px 7px 7px 7px;
	}

	a {
		color: black;
		text-decoration: none
	}

	.dark a {
		color: #b2c4dd;
	}

	a:hover, .dark a:hover {
		text-decoration: underline;
	}

	ul {
		list-style-type: none;
		margin: 0;
		padding: 0;
		background-color: #333;
	}

	li {
		float: left;
	}

	li a {
		display: block;
		color: white;
		text-align: center;
		padding: 14px 16px;
		text-decoration: none;
	}

	li a:hover:not(.active) {
		background-color: #111;
	}

	.button-container {
		display: inline-flex;
		flex-wrap: wrap-reverse;
		flex-direction: row;
		align-items: flex-start;
		overflow-x: hidden;
		white-space: pre-wrap;
		padding: 0 4px;
	}

	.button {
		background-color: #dfdfdf;
		border: 1px solid #cecece;
		border-bottom-width: 2px;
		color: rgba(0, 0, 0, 0.7);
		padding: 6px 4px 4px;
		text-align: center;
		text-decoration: none;
		font-size: 12px;
		margin: 0;
		cursor: pointer;
		transition-duration: 100ms;
		order: 3;
		min-width: 40px;
	}

	.dark button {
		background-color: #222222;
		border-color: #343434;
		color: rgba(255, 255, 255, 0.5);
	}

	.button:hover {
		background-color: #ececec;
		transition-duration: 0;
	}

	.dark button:hover {
		background-color:  #2e2e2e;
	}

	.button:active, .button.active {
		background-color: #ffffff;
		color: black;
		border-top-color: #cecece;
		border-left-color: #cecece;
		border-right-color: #cecece;
		border-bottom-color: #ffffff;
	}

	.dark .button:active, .dark .button.active {
		background-color: #444444;
		color: white;
		border-top-color: #343434;
		border-left-color: #343434;
		border-right-color: #343434;
		border-bottom-color: #ffffff;
	}

	.grid-container {
		margin: -2px;
		margin-right: -15px;
	}

	.grid-item {
		position: relative;
		display: inline-block;
		width: 100%;
		box-sizing: border-box;
		overflow: visible;
		padding: 3px 2px;
		text-decoration: none;
	}

	@media only screen and (min-width: 300px) {
		.grid-item {
			width: 50%;
		}
	}

	@media only screen and (min-width: 430px) {
		.grid-item {
			width: 33%;
		}
	}

	@media only screen and (min-width: 560px) {
		.grid-item {
			width: 25%;
		}
	}

	@media only screen and (min-width: 770px) {
		.grid-item {
			width: 20%;
		}
	}

	.grid-item:hover {
		z-index: 1;
	}

	.grid-item:hover .grid-item-text {
		width: auto;
		text-decoration: underline;
	}

	.grid-item-text {
		display: inline-block;
		width: 100%;
		background-color: #ffffff;
		margin: 0 -6px;
		padding: 0 6px;
		white-space: nowrap;
		overflow: hidden;
		text-overflow: ellipsis;
		pointer-events: none;
	}

	.dark .grid-item-text {
		background-color: #131313;
	}

	.link {
		display: inline;
		background: none;
		border: none;
		padding: 7px 14px;
		color: black;
		text-decoration: none;
		cursor: pointer;
		font-size: 13px;
		margin: 2px 2px;
	}

	.dark .link {
		color: #abc6ec;
	}

	.link:hover {
		text-decoration: underline;
	}

	img {
		image-rendering: pixelated;
	}

	.interview_panel_controls, .interview_panel_stats {
		margin-bottom: 10px;
	}

	/* MC Tab Styles */
	.mc-container { padding: 0; }

	.mc-section-header {
		font-weight: bold;
		font-size: 13px;
		padding: 5px 6px;
		margin: 0;
		cursor: pointer;
		background-color: #e8e8e8;
		border-bottom: 1px solid #ccc;
		user-select: none;
	}
	.dark .mc-section-header {
		background-color: #1e1e1e;
		border-bottom-color: #333;
	}
	.mc-section-header:hover { background-color: #ddd; }
	.dark .mc-section-header:hover { background-color: #282828; }

	.mc-server-table, .mc-ping-table {
		width: 100%;
		border-collapse: collapse;
		margin-bottom: 2px;
	}
	.mc-server-table td, .mc-ping-table td {
		padding: 2px 5px;
		border-bottom: 1px solid #eee;
		font-size: 12px;
	}
	.dark .mc-server-table td, .dark .mc-ping-table td {
		border-bottom-color: #222;
	}
	.mc-label {
		font-weight: bold;
		white-space: nowrap;
		width: 1%;
		color: #555;
		padding-right: 8px;
	}
	.dark .mc-label { color: #88a0b8; }

	.mc-filter {
		width: calc(100% - 12px);
		margin: 4px 6px;
		padding: 4px 6px;
		font-size: 12px;
		border: 1px solid #ccc;
		box-sizing: border-box;
	}
	.dark .mc-filter {
		background-color: #1a1a1a;
		border-color: #333;
		color: #b2c4dd;
	}

	/* Key subsystems detail section */
	.mc-key-section {
		display: grid;
		grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
		gap: 0;
		margin-bottom: 4px;
	}
	.mc-key-card {
		padding: 4px 6px;
		border-bottom: 1px solid #e0e0e0;
	}
	.dark .mc-key-card {
		border-bottom-color: #282828;
	}
	.mc-key-header {
		display: flex;
		align-items: baseline;
		gap: 8px;
		margin-bottom: 2px;
	}
	.mc-key-name {
		font-weight: bold;
		font-size: 13px;
	}
	.mc-key-name a { font-weight: bold; }
	.mc-key-stats {
		font-size: 12px;
		color: #666;
		font-family: Consolas, monospace;
	}
	.dark .mc-key-stats { color: #7a8a9a; }
	.mc-key-table {
		border-collapse: collapse;
		margin: 2px 0 0 4px;
	}
	.mc-key-dlabel {
		font-size: 12px;
		color: #666;
		padding: 0 10px 0 0;
		white-space: nowrap;
	}
	.dark .mc-key-dlabel { color: #7a8a9a; }
	.mc-key-dval {
		font-size: 12px;
		font-family: Consolas, monospace;
		color: #333;
		padding: 0;
	}
	.dark .mc-key-dval { color: #a0b0c0; }

	.mc-ss-table {
		width: 100%;
		border-collapse: collapse;
		font-size: 12px;
		table-layout: fixed;
	}
	.mc-ss-table th {
		position: sticky;
		top: 0;
		background: #f0f0f0;
		border-bottom: 2px solid #999;
		padding: 3px 4px;
		text-align: left;
		font-size: 11px;
		cursor: pointer;
		user-select: none;
		white-space: nowrap;
	}
	.dark .mc-ss-table th {
		background: #1a1a1a;
		border-bottom-color: #444;
	}
	.mc-th-sort:hover { background: #ddd; }
	.dark .mc-th-sort:hover { background: #2a2a2a; }
	.mc-sorted::after { content: " \25B2"; font-size: 9px; }
	.mc-sorted.desc::after { content: " \25BC"; }

	/* Column widths */
	.mc-ss-table th:nth-child(1), .mc-ss-table td:nth-child(1) { width: 20px; text-align: center; }
	.mc-ss-table th:nth-child(2), .mc-ss-table td:nth-child(2) { overflow: hidden; text-overflow: ellipsis; }
	.mc-ss-table th:nth-child(3), .mc-ss-table td:nth-child(3) { width: 50px; }
	.mc-ss-table th:nth-child(4), .mc-ss-table td:nth-child(4) { width: 44px; }
	.mc-ss-table th:nth-child(5), .mc-ss-table td:nth-child(5) { width: 50px; }
	.mc-ss-table th:nth-child(6), .mc-ss-table td:nth-child(6) { width: 38px; }
	.mc-ss-table th:nth-child(7), .mc-ss-table td:nth-child(7) { width: 54px; }

	.mc-ss-table td {
		padding: 2px 4px;
		border-bottom: 1px solid #eee;
		white-space: nowrap;
		overflow: hidden;
	}
	.dark .mc-ss-table td { border-bottom-color: #1e1e1e; }
	.mc-ss-table tr:hover td { background: #f0f0f0; }
	.dark .mc-ss-table tr:hover td { background: #1f1f1f; }

	.mc-num { text-align: right; font-family: Consolas, monospace; }

	/* State indicators */
	.mc-state { font-weight: bold; font-family: Consolas, monospace; }
	.mc-state-2 { color: #2a2; }
	.mc-state-1 { color: #888; }
	.mc-state-3, .mc-state-5 { color: #c80; }
	.mc-state-4 { color: #66f; }
	.mc-state-0 { color: #aaa; }
	.dark .mc-state-2 { color: #4c4; }
	.dark .mc-state-3, .dark .mc-state-5 { color: #ea0; }
	.dark .mc-state-4 { color: #88f; }

	/* Health colors */
	.mc-health-green { color: #080; }
	.mc-health-yellow { color: #a80; }
	.mc-health-red { color: #c00; font-weight: bold; }
	.dark .mc-health-green { color: #4a4; }
	.dark .mc-health-yellow { color: #db0; }
	.dark .mc-health-red { color: #f44; }

	.mc-bg a { font-style: italic; opacity: 0.7; }
	.mc-offline { opacity: 0.4; }

	.mc-val-good { color: #080; }
	.mc-val-warn { color: #a80; }
	.mc-val-bad { color: #c00; }
	.dark .mc-val-good { color: #4a4; }
	.dark .mc-val-warn { color: #db0; }
	.dark .mc-val-bad { color: #f44; }

	/* Status Tab Styles */
	.st-container { padding: 0; }

	.st-ping-bar {
		display: flex;
		align-items: center;
		gap: 8px;
		padding: 5px 8px;
		font-size: 12px;
		font-family: Consolas, monospace;
		background-color: #f5f5f5;
		border-bottom: 1px solid #ddd;
	}
	.dark .st-ping-bar {
		background-color: #1a1a1a;
		border-bottom-color: #2a2a2a;
	}
	.st-ping-dot {
		width: 8px;
		height: 8px;
		border-radius: 50%;
		flex-shrink: 0;
	}

	.st-section-header {
		font-weight: bold;
		font-size: 13px;
		padding: 3px 6px;
		margin: 0;
		cursor: pointer;
		background-color: #e8e8e8;
		border-bottom: 1px solid #ccc;
		user-select: none;
	}
	.dark .st-section-header {
		background-color: #1e1e1e;
		border-bottom-color: #333;
	}
	.st-section-header:hover { background-color: #ddd; }
	.dark .st-section-header:hover { background-color: #282828; }

	.st-table {
		width: 100%;
		border-collapse: collapse;
		margin-bottom: 2px;
	}
	.st-table td {
		padding: 1px 5px;
		border-bottom: 1px solid #eee;
		font-size: 12px;
	}
	.dark .st-table td {
		border-bottom-color: #222;
	}
	.st-label {
		font-weight: bold;
		white-space: nowrap;
		width: 1%;
		color: #555;
		padding-right: 8px;
	}
	.dark .st-label { color: #88a0b8; }
	.st-value {
		font-family: Consolas, monospace;
	}

	/* Shared grid layout for Status & MC tabs */
	.st-grid {
		display: grid;
		grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
	}
	.st-grid-item {

		border-bottom: 1px solid #eee;
		min-width: 0;
		overflow: hidden;
	}
	.dark .st-grid-item { border-bottom-color: #282828; }
	.st-item-label {

		font-weight: bold;
		color: #888;
		text-transform: uppercase;
		letter-spacing: 0.3px;
		white-space: nowrap;
		overflow: hidden;
		text-overflow: ellipsis;
	}
	.dark .st-item-label { color: #7a8a9a; }
	.st-item-value {
		font-size: 13px;
		font-family: Consolas, monospace;
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;

	.dark .st-item-value { color: #a0b0c0; }
	.st-item-value a { font-weight: bold; }
	.st-grid-wide { grid-column: 1 / -1; }

	.st-shuttle-bar {
		padding: 6px 8px;
		font-weight: bold;
		font-size: 13px;
		border-bottom: 1px solid #ccc;
	}
	.st-shuttle-bar.st-shuttle-warn {
		background-color: #fff3cd;
		color: #856404;
	}
	.dark .st-shuttle-bar.st-shuttle-warn {
		background-color: #3d3200;
		color: #ffc107;
	}
	.st-shuttle-bar.st-shuttle-danger {
		background-color: #f8d7da;
		color: #721c24;
	}
	.dark .st-shuttle-bar.st-shuttle-danger {
		background-color: #3d0a0a;
		color: #f55;
	}

	.st-vote-section {
		padding: 4px 6px;
		border-top: 1px solid #ddd;
	}
	.dark .st-vote-section { border-top-color: #333; }
	.st-vote-header {
		font-weight: bold;
		font-size: 13px;
		padding: 4px 0;
		color: #555;
	}
	.dark .st-vote-header { color: #88a0b8; }
	.st-vote-table {
		width: 100%;
		border-collapse: collapse;
	}
	.st-vote-table td {
		padding: 2px 4px;
		font-size: 12px;
	}
	.st-vote-table a {

	}
	.st-vote-table a:hover {

	.st-val-good { color: #080; }
	.st-val-warn { color: #a80; }
	.st-val-bad { color: #c00; font-weight: bold; }
	.dark .st-val-good { color: #4a4; }
	.dark .st-val-warn { color: #db0; }
	.dark .st-val-bad { color: #f44; }

	.st-tidi-row {
		display: flex;
		align-items: baseline;
		gap: 6px;
		padding: 4px 8px;

		font-size: 14px;
		font-weight: bold;

		font-size: 11px;
		color: #777;

	.dark .st-tidi-avgs { color: #7a8a9a; }
</style>

<body>
<ul id="menu" class="button-container"></ul>
<div id="under_menu"></div>

<script>
// DPI compensation — scale content down on high-DPI displays,
// matching the approach used by TGUI (drag.js) and /datum/browser.
var pixelRatio = window.devicePixelRatio || 1;
var statbrowserBaseZoom = pixelRatio !== 1 ? (100 / pixelRatio) : 100;
var statbrowserUserZoom = 1;
var statbrowserIndicator = null;
var statbrowserHideTimer = null;
var statbrowserPersistTimer = null;

function clampStatbrowserZoom(value) {
	return Math.min(2.0, Math.max(0.5, value));
}

function ensureStatbrowserIndicator() {
	if (statbrowserIndicator || !document.body) {
		return;
	}

	statbrowserIndicator = document.createElement('div');
	statbrowserIndicator.id = 'legacyZoomIndicator';
	statbrowserIndicator.style.cssText = 'position:fixed;top:12px;right:12px;z-index:2147483647;padding:6px 10px;border-radius:6px;background:rgba(0,0,0,0.75);color:#fff;font:12px/1.2 Verdana,sans-serif;pointer-events:none;opacity:0;transition:opacity 120ms linear;';
	document.body.appendChild(statbrowserIndicator);
}

function showStatbrowserIndicator() {
	ensureStatbrowserIndicator();
	if (!statbrowserIndicator) {
		return;
	}

	statbrowserIndicator.textContent = 'Scale: ' + Math.round(statbrowserUserZoom * 100) + '%';
	statbrowserIndicator.style.opacity = '1';
	clearTimeout(statbrowserHideTimer);
	statbrowserHideTimer = setTimeout(function() {
		if (statbrowserIndicator) {
			statbrowserIndicator.style.opacity = '0';
		}
	}, 1200);
}

function applyStatbrowserZoom() {
	document.body.style.zoom = (statbrowserBaseZoom * statbrowserUserZoom) + '%';
}

function scheduleStatbrowserZoomPersist() {
	clearTimeout(statbrowserPersistTimer);
	statbrowserPersistTimer = setTimeout(function() {
		byond_topic(
			'?src=_statpanel_;statbrowser_zoom_save=1;zoom_value='
			+ encodeURIComponent(String(statbrowserUserZoom))
		);
	}, 200);
}

function set_zoom_pref(value) {
	var parsedZoom = Number(value);
	if (!isFinite(parsedZoom) || parsedZoom <= 0) {
		return;
	}

	statbrowserUserZoom = clampStatbrowserZoom(parsedZoom);
	applyStatbrowserZoom();
}

function updateStatbrowserZoom(delta) {
	statbrowserUserZoom = clampStatbrowserZoom(Math.round((statbrowserUserZoom + delta) * 100) / 100);
	applyStatbrowserZoom();
	scheduleStatbrowserZoomPersist();
	showStatbrowserIndicator();
}

window.addEventListener('wheel', function(event) {
	if (!event.ctrlKey) {
		return;
	}

	var direction = Math.sign(event.deltaY);
	if (!direction) {
		return;
	}

	event.preventDefault();
	updateStatbrowserZoom(direction < 0 ? 0.1 : -0.1);
}, { passive: false });

applyStatbrowserZoom();
ensureStatbrowserIndicator();

// Status panel implementation ------------------------------------------------
var status_tab_parts = ["Loading..."];
var current_tab = null;
// Status tab structured data
var st_global_data = null;
var st_ping_data = null;
var st_mob_items = [];
var st_sections = { round: true, time: true, character: true };
var st_container = null;
var st_ping_bar = null;
var st_server_grid = null;
var st_time_grid = null;
var st_tidi_el = null;
var st_shuttle_el = null;
var st_char_table = null;
var st_vote_el = null;
var mc_tab_parts = [["Loading...", ""]];
// MC tab structured data
var mc_server_data = {};
var mc_ss_data = [];
var mc_sort_col = 2;
var mc_sort_asc = false;
var mc_filter_text = "";
var mc_sections = { server: true, ping: false, key: true, subsystems: true };
var mc_container = null;
var mc_server_grid = null;
var mc_ping_table = null;
var mc_ss_table = null;
var mc_ss_tbody = null;
var mc_ss_rows = {};
var mc_filter_input = null;
var mc_key_section = null;
var mc_ss_header = null;
var vote_parts = [[null]];
var href_token = null;
var spells = [];
var spell_tabs = [];
var verb_tabs = [];
var verbs = [["", ""]]; // list with a list inside
var tickets = [];
var interviewManager = {status: "", interviews: []};
var sdql2 = [];
var permanent_tabs = []; // tabs that won't be cleared by wipes
var turfcontents = [];
var turfcontentsRaw = "";
var turfname = "";
var turfTable = null;
var turfItemNodes = {}; // ref -> container div
var imageRetryDelay = 500;
var imageRetryLimit = 50;
var menu = document.getElementById('menu');
var under_menu = document.getElementById('under_menu');
var statcontentdiv = document.getElementById('statcontent');
var storedimages = [];
var split_admin_tabs = false;

var connected = false;
var commandQueue = [];

// BYOND bridge helpers ------------------------------------------------------
function byond_bridge_call(path, params) {
	var query = "";
	var i = 0;
	if (params) {
		for (var key in params) {
			if (!params.hasOwnProperty(key)) {
				continue;
			}
			if (i++ > 0) {
				query += "&";
			}
			var value = params[key];
			if (value === null || typeof value === "undefined") {
				value = "";
			}
			query += encodeURIComponent(key) + "=" + encodeURIComponent(value);
		}
	}

	var rawUrl = (path || "") + "?" + query;
	var protocolUrl = "byond://" + rawUrl;

	if (window.cef_to_byond) {
		try {
			window.cef_to_byond(protocolUrl);
			return true;
		} catch (e) {}
	}

	var bridge = window.BYOND;
	if (bridge) {
		var callTargets = [];
		if (typeof bridge === "function") {
			callTargets.push(bridge);
		}
		var methodNames = [
			"callByond",
			"byond",
			"call",
			"topic",
			"sendMessage",
			"send",
			"postMessage"
		];
		for (var m = 0; m < methodNames.length; m++) {
			var method = bridge[methodNames[m]];
			if (typeof method === "function") {
				callTargets.push(method);
			}
		}
		for (var c = 0; c < callTargets.length; c++) {
			try {
				callTargets[c].call(bridge, rawUrl);
				return true;
			} catch (e1) {}
			try {
				callTargets[c].call(bridge, protocolUrl);
				return true;
			} catch (e2) {}
		}
	}

	try {
		window.location.href = protocolUrl;
		return true;
	} catch (e3) {}

	try {
		var xhr = new XMLHttpRequest();
		xhr.open("GET", rawUrl);
		xhr.send();
		return true;
	} catch (e4) {}

	return false;
}

function byond_winset(params) {
	byond_bridge_call("winset", params || {});
}

// Send a pre-formatted Topic href through the BYOND bridge.
// href should be like "?src=_statpanel_;statpanel_item_target=REF"
function byond_topic(href) {
	var protocolUrl = "byond://" + href;

	if (window.cef_to_byond) {
		try {
			window.cef_to_byond(protocolUrl);
			return true;
		} catch (e) {}
	}

	var bridge = window.BYOND;
	if (bridge) {
		var callTargets = [];
		if (typeof bridge === "function") {
			callTargets.push(bridge);
		}
		var methodNames = [
			"callByond",
			"byond",
			"call",
			"topic",
			"sendMessage",
			"send",
			"postMessage"
		];
		for (var m = 0; m < methodNames.length; m++) {
			var method = bridge[methodNames[m]];
			if (typeof method === "function") {
				callTargets.push(method);
			}
		}
		for (var c = 0; c < callTargets.length; c++) {
			try {
				callTargets[c].call(bridge, href);
				return true;
			} catch (e1) {}
			try {
				callTargets[c].call(bridge, protocolUrl);
				return true;
			} catch (e2) {}
		}
	}

	try {
		window.location.href = protocolUrl;
		return true;
	} catch (e3) {}

	try {
		var xhr = new XMLHttpRequest();
		xhr.open("GET", href);
		xhr.send();
		return true;
	} catch (e4) {}

	return false;
}

// Any BYOND verb call must go through this, as if a verb is sent during reconnect then
// it will cause the reconnect to fail.
// This function will either call immediately, or queue until
// BYOND confirms we are connected.
function send_byond_command(command) {
	if (connected) {
		byond_winset({ command: command });
	} else {
		commandQueue.push(command);
	}
}

// Any BYOND commands that could result in the client's focus changing go through this
// to ensure that when we relinquish our focus, we don't do it after the result of
// a command has already taken focus for itself.
function run_after_focus(callback) {
	setTimeout(callback, 0);
}

function connected_to_server() {
	if (connected) {
		return;
	}

	connected = true;

	for (var index = 0; index < commandQueue.length; index++) {
		byond_winset({ command: commandQueue[index] });
	}

	commandQueue = [];
}

	status = (status == true);

	if (split_admin_tabs !== status) {

			removeStatusTab("Events");

		}

	}

function createStatusTab(name) {
	if (name.indexOf(".") != -1) {
		var splitName = name.split(".");
		if (split_admin_tabs && splitName[0] === "Admin")
			name = splitName[1];
		else
			name = splitName[0];
	}
	if(document.getElementById(name) || name.trim() == "")
		return;
	if(!verb_tabs.includes(name) && !permanent_tabs.includes(name))
		return;
	var B = document.createElement("BUTTON");
	B.onclick = function() {
		tab_change(name);
		this.blur();
	};
	B.id = name;
	B.textContent = name;
	B.className = "button";
	//ORDERING ALPHABETICALLY
	B.style.order = name.charCodeAt(0);
	if(name == "Status" || name == "MC")
		B.style.order = name == "Status" ? 1 : 2;
	//END ORDERING
	menu.appendChild(B);
	SendTabToByond(name);
	under_menu.style.height = menu.clientHeight + 'px';
}

function removeStatusTab(name) {
	if(!document.getElementById(name) || permanent_tabs.includes(name))
		return;
	for (var i = verb_tabs.length - 1; i >= 0; --i) {
		if (verb_tabs[i] == name) {
			verb_tabs.splice(i, 1);
		}
	}
	menu.removeChild(document.getElementById(name));
	TakeTabFromByond(name);
	under_menu.style.height = menu.clientHeight + 'px';
}

function sortVerbs() {
	verbs.sort(function (a, b) {
		var selector = a[0] == b[0] ? 1 : 0;
		if (a[selector].toUpperCase() < b[selector].toUpperCase()) {
			return 1;
		}
		else if (a[selector].toUpperCase() > b[selector].toUpperCase()) {
			return -1;
		}
		return 0;
	})
}

window.onresize = function () {
	under_menu.style.height = menu.clientHeight + 'px';
}

function addPermanentTab(name) {
	if(!permanent_tabs.includes(name))

}

function removePermanentTab(name) {
	for (var i = permanent_tabs.length - 1; i >= 0; --i) {
		if (permanent_tabs[i] == name) {
			permanent_tabs.splice(i, 1);
		}

}

function checkStatusTab() {

function remove_verb(v) {
	var verb_to_remove = v; // to_remove = [verb:category, verb:name]
	for(var i = verbs.length - 1; i >= 0; i--){
		var part_to_remove = verbs[i];
		if(part_to_remove[1] == verb_to_remove[1]){
			verbs.splice(i, 1)
		}
	}
}

function check_verbs() {
	for(var v = verb_tabs.length - 1; v >= 0; v--){
		verbs_cat_check(verb_tabs[v]);
	}
}

function verbs_cat_check(cat) {
	var tabCat = cat;
	if (cat.indexOf(".") != -1) {
		var splitName = cat.split(".");
		if (split_admin_tabs && splitName[0] === "Admin")
			tabCat = splitName[1];
		else
			tabCat = splitName[0];
	}
	var verbs_in_cat = 0;
	var verbcat = "";
	if(!verb_tabs.includes(tabCat)){
		removeStatusTab(tabCat);
		return;
	}
	for(var v = 0; v < verbs.length; v++){
		var part = verbs[v];
		verbcat = part[0];
		if (verbcat.indexOf(".") != -1) {
			var splitName = verbcat.split(".");
			if (split_admin_tabs && splitName[0] === "Admin")
				verbcat = splitName[1];
			else
				verbcat = splitName[0];
		}
		if(verbcat != tabCat || verbcat.trim() == ""){
			continue;
		}
		else{
			verbs_in_cat = 1;
			break; // we only need one
		}
	}
	if(verbs_in_cat != 1) {
		removeStatusTab(tabCat);
		if(current_tab == tabCat)
			tab_change("Status");
	}
}

function findVerbindex(name, verblist) {
	for(var i = 0; i < verblist.length; i++) {
		var part = verblist[i];
		if(part[1] == name)
			return i;
	}
}
function wipe_verbs() {
	verbs = [["", ""]];
	verb_tabs = [];
	checkStatusTab(); // remove all empty verb tabs
}

function update_verbs() {
	wipe_verbs();
	send_byond_command("Update-Verbs");
}

function add_verb_list(v) {
	var to_add = JSON.parse(v); // list of a list with category and verb inside it
	to_add.sort(); // sort what we're adding
	for(var i = 0; i < to_add.length; i++) {
		var part = to_add[i];
		if(!part[0])
			continue;
		var category = part[0];
		if (category.indexOf(".") != -1) {
			var splitName = category.split(".");
			if (split_admin_tabs && splitName[0] === "Admin")
				category = splitName[1];
			else
				category = splitName[0];
		}
		if(findVerbindex(part[1], verbs))
			continue;
		if(verb_tabs.includes(category)){
			verbs.push(part);
			if(current_tab == category) {
				draw_verbs(category); // redraw if we added a verb to the tab we're currently in
			}
		} else if(category) {
			verb_tabs.push(category);
			verbs.push(part);
			createStatusTab(category);
		}
	}
}

function remove_verb_list(v) {
	var to_remove = JSON.parse(v);
	for(var i = 0; i < to_remove.length; i++) {
		remove_verb(to_remove[i]);
	}
	check_verbs();
	sortVerbs();
	if(verb_tabs.includes(current_tab))
		draw_verbs(current_tab);
}

// passes a 2D list of (verbcategory, verbname) creates tabs and adds verbs to respective list
// example (IC, Say)
function init_verbs(c, v) {
	connected_to_server();
	wipe_verbs(); // remove all verb categories so we can replace them
	checkStatusTab(); // remove all status tabs
	verb_tabs = JSON.parse(c);
	verb_tabs.sort(); // sort it
	var do_update = false;
	var cat = "";
	for(var i = 0; i < verb_tabs.length; i++){
		cat = verb_tabs[i];
		createStatusTab(cat); // create a category if the verb doesn't exist yet
	}
	if(verb_tabs.includes(current_tab)) {
		do_update = true;
	}
	if(v) {
		add_verb_list(v);
		sortVerbs(); // sort them
		if(do_update) {
			draw_verbs(current_tab);
		}
	}
	SendTabsToByond();
}

function SendTabsToByond(){
	var tabstosend = [];
	tabstosend = tabstosend.concat(permanent_tabs, verb_tabs);
	for(var i=0; i < tabstosend.length; i++){
		SendTabToByond(tabstosend[i]);
	}
}

//Byond can't have this tab anymore since we're removing it

function tab_change(tab) {
	if(tab == current_tab) return;
	if(document.getElementById(current_tab))
		document.getElementById(current_tab).className = "button"; // disable active on last button
	current_tab = tab;
	set_byond_tab(tab);
	if(document.getElementById(tab))
		document.getElementById(tab).className = "button active"; // make current button active
	var spell_tabs_thingy = (spell_tabs.includes(tab));
	var verb_tabs_thingy = (verb_tabs.includes(tab));
	if(tab == "Status") {
		draw_status();
	} else if(tab == "MC") {
		draw_mc();
	} else if(spell_tabs_thingy) {
		draw_spells(tab);
	} else if(verb_tabs_thingy){
		draw_verbs(tab);
	} else if(tab == "Debug Stat Panel") {
		draw_debug();
	} else if(tab == "Tickets") {
		draw_tickets();
//		draw_interviews();
	} else if(tab == "SDQL2") {
		draw_sdql2();
	}else if(tab == turfname) {
		draw_listedturf();
	} else {
		statcontentdiv.textContent = "Loading...";
	}
	byond_winset({ "statbrowser.is-visible": "true" });
}

function st_make_grid_item(label, value, wide, cls, href) {
	var item = document.createElement("div");
	item.className = "st-grid-item" + (wide ? " st-grid-wide" : "");
	var lbl = document.createElement("div");
	lbl.className = "st-item-label";
	lbl.textContent = label;
	item.appendChild(lbl);
	var val = document.createElement("div");
	val.className = "st-item-value";
	if (href) {
		var a = document.createElement("a");
		a.href = "#";
		a.onclick = (function(h) {
			return function(e) {
				e.preventDefault();
				byond_topic(h);
				return false;
			};
		})(href);
		a.textContent = value;
		if (cls) a.className = cls;
		val.appendChild(a);
	} else {
		val.textContent = "" + value;
		if (cls) val.className += " " + cls;
	}
	item.appendChild(val);
	return item;
}

	if (idx > 0 && idx < 30) {

	return null;
}

function draw_status() {

		createStatusTab("Status");
		current_tab = "Status";
	}

	var d = st_global_data;
	if (!d) {
		statcontentdiv.textContent = "Loading...";
		return;

		st_container = document.createElement("div");
		st_container.className = "st-container";

		// Ping bar

		st_container.appendChild(st_ping_bar);

		// Shuttle bar (hidden by default)

		st_shuttle_el.className = "st-shuttle-bar";
		st_shuttle_el.style.display = "none";
		st_container.appendChild(st_shuttle_el);

		// Round section
		st_container.appendChild(st_build_section_header("round", "\u0420\u0430\u0443\u043D\u0434"));
		st_server_grid = document.createElement("div");
		st_server_grid.className = "st-grid";

		st_container.appendChild(st_build_section_header("time", "\u0412\u0440\u0435\u043C\u044F"));
		st_time_grid = document.createElement("div");
		st_time_grid.className = "st-grid";
		st_container.appendChild(st_time_grid);

		// Character section
		st_container.appendChild(st_build_section_header("character", "\u041F\u0435\u0440\u0441\u043E\u043D\u0430\u0436"));
		st_char_table = document.createElement("table");
		st_char_table.className = "st-table";
		st_container.appendChild(st_char_table);

		statcontentdiv.appendChild(st_container);

		// Vote section (outside st_container for BYOND browser link compatibility)

		st_vote_el.className = "st-vote-section";
		st_vote_el.style.display = "none";
		statcontentdiv.appendChild(st_vote_el);
	}

	// Update ping bar
	if (st_ping_data) {
		var ping = st_ping_data[0];
		var avg = st_ping_data[1];
		var isDark = document.body.classList.contains("dark");
		var dotColor = isDark ? st_ping_color_dark(ping) : st_ping_color(ping);
		st_ping_bar.innerHTML = "";
		var dot = document.createElement("span");
		dot.className = "st-ping-dot";
		dot.style.backgroundColor = dotColor;
		st_ping_bar.appendChild(dot);
		var txt = document.createElement("span");
		txt.className = st_ping_class(ping);
		txt.textContent = "\u041F\u0438\u043D\u0433: " + ping + "ms";
		st_ping_bar.appendChild(txt);
		var avg_txt = document.createElement("span");
		avg_txt.style.color = "#777";
		avg_txt.textContent = "(\u0441\u0440\u0435\u0434: " + avg + "ms)";
		st_ping_bar.appendChild(avg_txt);

		if (d.tidi) {
			var spacer = document.createElement("span");
			spacer.style.flexGrow = "1";
			st_ping_bar.appendChild(spacer);

			var cur = d.tidi[0];
			var tidiTxt = document.createElement("span");
			tidiTxt.className = st_tidi_class(cur);
			tidiTxt.textContent = "\u041E\u0442\u043A\u043B: " + cur + "%";
			st_ping_bar.appendChild(tidiTxt);

			var tidiAvg = document.createElement("span");
			tidiAvg.style.color = "#777";
			tidiAvg.textContent = " (\u0441\u0440: " + d.tidi[2] + "%)";
			st_ping_bar.appendChild(tidiAvg);
		}
	}

	// Update shuttle bar
	if (d.shuttle) {
		st_shuttle_el.style.display = "";
		st_shuttle_el.textContent = "\uD83D\uDE80 " + d.shuttle[0] + " " + d.shuttle[1];
		// Use danger style for final countdown-like modes
		st_shuttle_el.className = "st-shuttle-bar st-shuttle-warn";
	} else {
		st_shuttle_el.style.display = "none";
	}

	// Update server/round section
	if (st_sections.round && d.server) {
		st_fill_grid(st_server_grid, d.server);
		st_server_grid.style.display = "";
	} else if (!st_sections.round) {
		st_server_grid.style.display = "none";
	}

	// Update time section
	if (st_sections.time && d.time) {
		st_fill_grid(st_time_grid, d.time);
		st_time_grid.style.display = "";
	} else if (!st_sections.time) {
		st_time_grid.style.display = "none";
	}

	// Update character section (mob items)
	if (st_sections.character) {
		st_char_table.textContent = "";
		for (var i = 0; i < st_mob_items.length; i++) {
			var item = st_mob_items[i];
			if (typeof item !== "string" || item.trim() === "") continue;
			var parsed = st_parse_mob_item(item);
			if (parsed) {
				st_char_table.appendChild(st_make_row(parsed[0], parsed[1]));
			} else {
				var tr = document.createElement("tr");
				var td = document.createElement("td");
				td.colSpan = 2;
				td.className = "st-value";
				td.textContent = item;
				tr.appendChild(td);
				st_char_table.appendChild(tr);
			}
		}
		st_char_table.style.display = st_mob_items.length > 0 ? "" : "none";
		// Also hide the character section header if no items
		if (st_char_table.previousElementSibling && st_char_table.previousElementSibling.classList.contains("st-section-header")) {
			st_char_table.previousElementSibling.style.display = st_mob_items.length > 0 ? "" : "none";
		}
	} else {
		st_char_table.style.display = "none";
	}

	// Update voting section
	if (vote_parts && vote_parts[0] && vote_parts[0][0]) {
		st_vote_el.style.display = "";
		st_vote_el.textContent = "";
		var table = document.createElement("table");
		table.className = "st-vote-table";
		for (var i = 0; i < vote_parts.length; i++) {
			var part = vote_parts[i];
			var tr = document.createElement("tr");
			var td1 = document.createElement("td");
			td1.textContent = part[0];
			var td2 = document.createElement("td");
			if (part[2]) {
				var a = document.createElement("a");
				a.href = "#";
				a.style.cursor = "pointer";
				if (part[2] === "disabled") {
					a.onclick = function(e) {
						if (e && e.preventDefault) e.preventDefault();
						byond_winset({ command: "Vote" });
						return false;
					};
				} else {
					a.onclick = (function(ref) {
						return function(e) {
							if (e && e.preventDefault) e.preventDefault();
							byond_topic("?src=" + ref);
							return false;
						};
					})(part[2]);
				}
				a.textContent = part[1];
				td2.appendChild(a);
			} else {
				td2.textContent = part[1];
			}
			tr.appendChild(td1);
			tr.appendChild(td2);
			table.appendChild(tr);
		}
		st_vote_el.appendChild(table);
	} else {
		st_vote_el.style.display = "none";
	}

	if(verb_tabs.length == 0 || !verbs) {
		send_byond_command("Fix-Stat-Panel");
	}
}

// MC Tab: subsystem data column indices
var SS_NAME = 0, SS_STATE = 1, SS_COST = 2, SS_TICK = 3, SS_OVERRUN = 4,
	SS_TICKS = 5, SS_FIRED = 6, SS_CAN_FIRE = 7, SS_IS_BG = 8, SS_REF = 9, SS_EXTRA = 10;
var STATE_LETTERS = ["  ", "Q", "R", "P", "S", "P"];
// Key subsystems that get a dedicated detail section
var MC_KEY_SUBSYSTEMS = ["Atmospherics", "Garbage", "Machines", "Mobs", "Timer", "Objects"];

function mc_health_cost(ms) {
	if (ms >= 10) return "mc-health-red";
	if (ms >= 3) return "mc-health-yellow";
	return "mc-health-green";
}
function mc_health_tick(pct) {
	if (pct >= 20) return "mc-health-red";
	if (pct >= 8) return "mc-health-yellow";
	return "mc-health-green";
}
function mc_health_overrun(pct) {
	if (pct >= 5) return "mc-health-red";
	if (pct >= 1) return "mc-health-yellow";
	return "";
}
function mc_cpu_class(cpu) {
	if (cpu >= 100) return "mc-val-bad";
	if (cpu >= 80) return "mc-val-warn";
	return "mc-val-good";
}
function mc_tidi_class(tidi) {
	if (tidi >= 20) return "mc-val-bad";
	if (tidi >= 5) return "mc-val-warn";
	return "mc-val-good";
}

function mc_set_text(td, val) {
	var s = "" + val;
	if (td.textContent !== s) td.textContent = s;
}

function mc_make_vv_link(ref) {
	return "?_src_=vars;admin_token=" + href_token + ";Vars=" + ref;
}

function mc_build_section_header(key, label) {
	var div = document.createElement("div");
	div.className = "mc-section-header";
	div.textContent = (mc_sections[key] ? "\u25BC " : "\u25B6 ") + label;
	div.onclick = function() {
		mc_sections[key] = !mc_sections[key];
		div.textContent = (mc_sections[key] ? "\u25BC " : "\u25B6 ") + label;
		mc_toggle_section(key);
	};
	return div;
}

function mc_toggle_section(key) {
	if (key === "server" && mc_server_grid) {
		mc_server_grid.style.display = mc_sections.server ? "" : "none";
	} else if (key === "ping" && mc_ping_table) {
		mc_ping_table.style.display = mc_sections.ping ? "" : "none";
	} else if (key === "key" && mc_key_section) {
		mc_key_section.style.display = mc_sections.key ? "" : "none";
	} else if (key === "subsystems") {
		if (mc_ss_table) mc_ss_table.style.display = mc_sections.subsystems ? "" : "none";
		if (mc_filter_input) mc_filter_input.style.display = mc_sections.subsystems ? "" : "none";
	}
}

function mc_make_server_row(label, value, ref, cls) {
	var tr = document.createElement("tr");
	var td1 = document.createElement("td");
	td1.className = "mc-label";
	td1.textContent = label;
	var td2 = document.createElement("td");
	if (ref) {
		var a = document.createElement("a");
		a.href = "#";
		a.onclick = (function(r) {
			return function(e) {
				e.preventDefault();
				byond_topic(mc_make_vv_link(r));
				return false;
			};
		})(ref);
		a.textContent = value;
		if (cls) a.className = cls;
		td2.appendChild(a);
	} else {
		td2.textContent = value;
		if (cls) td2.className = cls;
	}
	tr.appendChild(td1);
	tr.appendChild(td2);
	return tr;
}

function mc_update_server_section() {

	var d = mc_server_data;

	mc_server_grid.appendChild(st_make_grid_item("\u0423\u0437\u043B\u044B", d.instances, false));

		" | \u0412\u043D\u0443\u0442\u0440.\u0442\u0438\u043A:" + d.internal_tick_usage + "%",

		d.camera_count + " | \u0427\u0430\u043D\u043A\u0438:" + d.camera_chunks,

	mc_server_grid.appendChild(st_make_grid_item("GLOB", "VV",
		false, null, mc_make_vv_link(d.ref_glob)));
	mc_server_grid.appendChild(st_make_grid_item("Config", "VV",
		false, null, mc_make_vv_link(d.ref_config)));
}

function mc_update_ping_section() {
	if (!mc_ping_table) return;
	mc_ping_table.textContent = "";
	if (!mc_sections.ping) return;
	var d = mc_server_data;
	mc_ping_table.appendChild(mc_make_server_row("RTT",
		"\u0421\u044D\u043C\u043F\u043B:" + d.ping_samples +
		" | Avg:" + d.ping_rtt_avg + "ms" +
		" | Max:" + d.ping_rtt_max + "ms" +
		" | Avg\u0421\u0440:" + d.ping_rtt_avg_avg + "ms",
		null, null));
	mc_ping_table.appendChild(mc_make_server_row("\u0422\u0438\u043A/\u0421\u0435\u0440\u0432\u0435\u0440",
		"\u0422\u0438\u043A Avg:" + d.ping_tick_avg + "ms" +
		" | \u0422\u0438\u043A Max:" + d.ping_tick_max + "ms" +
		" | \u0421\u0435\u0440\u0432 Avg:" + d.ping_server_avg + "ms" +
		" | \u0421\u0435\u0440\u0432 Max:" + d.ping_server_max + "ms",
		null, null));
	mc_ping_table.appendChild(mc_make_server_row("\u0414\u0436\u0438\u0442\u0442\u0435\u0440",
		"Raw:" + d.raw_mult +
		" | Last:" + d.jitter_last + "%" +
		" | Avg:" + d.jitter_avg + "%" +
		" | Max\u041E\u043A\u043D\u043E:" + d.jitter_max_wnd + "%" +
		" | Glide:" + d.glide_mult,
		null, null));
}

function mc_matches_filter(name) {
	if (!mc_filter_text) return true;
	return name.toLowerCase().indexOf(mc_filter_text) !== -1;
}

function mc_apply_filter() {
	for (var name in mc_ss_rows) {
		mc_ss_rows[name].style.display = mc_matches_filter(name) ? "" : "none";
	}
}

function mc_sort_and_reorder() {
	var rows = [];
	for (var name in mc_ss_rows) {
		rows.push(mc_ss_rows[name]);
	}
	var col = mc_sort_col;
	var asc = mc_sort_asc;
	rows.sort(function(a, b) {
		var ad = a._ssData;
		var bd = b._ssData;
		// Non-firing subsystems always at the bottom
		if (ad[SS_CAN_FIRE] !== bd[SS_CAN_FIRE]) return bd[SS_CAN_FIRE] - ad[SS_CAN_FIRE];
		if (col === SS_NAME) {
			var av = ("" + ad[col]).toLowerCase();
			var bv = ("" + bd[col]).toLowerCase();
			return asc ? (av < bv ? -1 : av > bv ? 1 : 0)
					   : (bv < av ? -1 : bv > av ? 1 : 0);
		}
		var an = parseFloat(ad[col]) || 0;
		var bn = parseFloat(bd[col]) || 0;
		return asc ? (an - bn) : (bn - an);
	});
	for (var i = 0; i < rows.length; i++) {
		if (mc_ss_tbody.childNodes[i] !== rows[i]) {
			mc_ss_tbody.insertBefore(rows[i], mc_ss_tbody.childNodes[i]);
		}
	}
}

function mc_update_sort_indicators() {
	if (!mc_ss_table) return;
	var ths = mc_ss_table.getElementsByTagName("th");
	for (var i = 0; i < ths.length; i++) {
		var col = parseInt(ths[i].getAttribute("data-col"));
		if (col === mc_sort_col) {
			ths[i].className = "mc-th-sort mc-sorted" + (mc_sort_asc ? "" : " desc");
		} else {
			ths[i].className = "mc-th-sort";
		}
	}
}

function mc_update_ss_rows() {
	var seen = {};
	for (var i = 0; i < mc_ss_data.length; i++) {
		var row = mc_ss_data[i];
		var name = row[SS_NAME];
		seen[name] = true;
		var tr = mc_ss_rows[name];
		if (!tr) {
			tr = document.createElement("tr");
			for (var c = 0; c < 7; c++) {
				tr.appendChild(document.createElement("td"));
			}
			mc_ss_rows[name] = tr;
			mc_ss_tbody.appendChild(tr);
		}
		var cells = tr.childNodes;
		var state_letter = STATE_LETTERS[row[SS_STATE]] || "?";
		var can_fire = row[SS_CAN_FIRE];

		// State
		mc_set_text(cells[0], state_letter);
		cells[0].className = "mc-state mc-state-" + row[SS_STATE];

		// Name with VV link
		var link = tr._nameLink;
		if (!link) {
			cells[1].textContent = "";
			link = document.createElement("a");
			cells[1].appendChild(link);
			tr._nameLink = link;
		}
		var dname = row[SS_IS_BG] ? name + " [BG]" : name;
		if (link.textContent !== dname) link.textContent = dname;
		link.href = "#";
		link.onclick = (function(r) {
			return function(e) {
				e.preventDefault();
				byond_topic(mc_make_vv_link(r));
				return false;
			};
		})(row[SS_REF]);
		cells[1].className = !can_fire ? "mc-name mc-offline" : (row[SS_IS_BG] ? "mc-name mc-bg" : "mc-name");

		// Numeric cells
		if (!can_fire) {
			mc_set_text(cells[2], "-"); cells[2].className = "mc-num";
			mc_set_text(cells[3], "-"); cells[3].className = "mc-num";
			mc_set_text(cells[4], "-"); cells[4].className = "mc-num";
			mc_set_text(cells[5], "-"); cells[5].className = "mc-num";
			mc_set_text(cells[6], row[SS_FIRED]); cells[6].className = "mc-num";
		} else {
			var cost = row[SS_COST];
			var tick = row[SS_TICK];
			var overrun = row[SS_OVERRUN];
			mc_set_text(cells[2], cost); cells[2].className = "mc-num " + mc_health_cost(cost);
			mc_set_text(cells[3], tick); cells[3].className = "mc-num " + mc_health_tick(tick);
			mc_set_text(cells[4], overrun); cells[4].className = "mc-num " + mc_health_overrun(overrun);
			mc_set_text(cells[5], row[SS_TICKS]); cells[5].className = "mc-num";
			mc_set_text(cells[6], row[SS_FIRED]); cells[6].className = "mc-num";
		}

		tr._ssData = row;
		tr.style.display = mc_matches_filter(name) ? "" : "none";
	}
	// Remove stale rows
	for (var n in mc_ss_rows) {
		if (!seen[n]) {
			mc_ss_tbody.removeChild(mc_ss_rows[n]);
			delete mc_ss_rows[n];
		}
	}
	mc_sort_and_reorder();
}

function mc_update_key_section() {
	if (!mc_key_section) return;
	mc_key_section.textContent = "";
	if (!mc_sections.key) return;
	var key_data = mc_server_data.key_ss || {};
	for (var i = 0; i < mc_ss_data.length; i++) {
		var row = mc_ss_data[i];
		var name = row[SS_NAME];
		if (MC_KEY_SUBSYSTEMS.indexOf(name) === -1) continue;
		var card = document.createElement("div");
		card.className = "mc-key-card";
		// Header line: name + cost/tick stats
		var header = document.createElement("div");
		header.className = "mc-key-header";
		var nameEl = document.createElement("span");
		nameEl.className = "mc-key-name";
		var nameLink = document.createElement("a");
		nameLink.href = "#";
		nameLink.onclick = (function(r) {
			return function(e) {
				e.preventDefault();
				byond_topic(mc_make_vv_link(r));
				return false;
			};
		})(row[SS_REF]);
		nameLink.textContent = name;
		nameEl.appendChild(nameLink);
		header.appendChild(nameEl);
		var statsEl = document.createElement("span");
		statsEl.className = "mc-key-stats";
		if (row[SS_CAN_FIRE]) {
			var costCls = mc_health_cost(row[SS_COST]);
			var tickCls = mc_health_tick(row[SS_TICK]);
			statsEl.innerHTML = '<span class="' + costCls + '">' + row[SS_COST] + 'ms</span>'
				+ ' | <span class="' + tickCls + '">' + row[SS_TICK] + '%</span>'
				+ ' | ' + STATE_LETTERS[row[SS_STATE]];
		} else {
			statsEl.textContent = "OFFLINE";
			statsEl.style.opacity = "0.5";
		}
		header.appendChild(statsEl);
		card.appendChild(header);
		// Structured detail table from key_ss backend data
		var details = key_data[name];
		if (details && details.length) {
			var dtable = document.createElement("table");
			dtable.className = "mc-key-table";
			for (var d = 0; d < details.length; d++) {
				var dtr = document.createElement("tr");
				var dtd1 = document.createElement("td");
				dtd1.className = "mc-key-dlabel";
				dtd1.textContent = details[d][0];
				var dtd2 = document.createElement("td");
				dtd2.className = "mc-key-dval";
				dtd2.textContent = details[d][1];
				dtr.appendChild(dtd1);
				dtr.appendChild(dtd2);
				dtable.appendChild(dtr);
			}
			card.appendChild(dtable);
		}
		mc_key_section.appendChild(card);
	}
}

function draw_mc() {
	// Build skeleton once; update in-place on subsequent calls
	if (!mc_container || !mc_container.parentNode) {
		statcontentdiv.textContent = "";
		mc_ss_rows = {};
		mc_container = document.createElement("div");
		mc_container.className = "mc-container";

		var cols = [
			{ label: "", col: SS_STATE, title: "\u0421\u0442\u0430\u0442\u0443\u0441" },
			{ label: "\u0418\u043C\u044F", col: SS_NAME, title: "\u0418\u043C\u044F" },
			{ label: "ms", col: SS_COST, title: "\u0421\u0442\u043E\u0438\u043C\u043E\u0441\u0442\u044C (ms)" },
			{ label: "\u0422\u0438\u043A%", col: SS_TICK, title: "% \u0442\u0438\u043A\u0430" },
			{ label: "\u041B\u0438\u043C%", col: SS_OVERRUN, title: "\u041F\u0435\u0440\u0435\u0440\u0430\u0441\u0445\u043E\u0434" },
			{ label: "\u0422\u0438\u043A\u0438", col: SS_TICKS, title: "\u0422\u0438\u043A\u0438 \u0437\u0430 \u0446\u0438\u043A\u043B" },
			{ label: "#", col: SS_FIRED, title: "\u0417\u0430\u043F\u0443\u0441\u043A\u043E\u0432" }
		];
		for (var c = 0; c < cols.length; c++) {
			var th = document.createElement("th");
			th.textContent = cols[c].label;
			th.title = cols[c].title;
			th.className = "mc-th-sort";
			th.setAttribute("data-col", cols[c].col);
			th.onclick = function() {
				var col = parseInt(this.getAttribute("data-col"));
				if (mc_sort_col === col) {
					mc_sort_asc = !mc_sort_asc;
				} else {
					mc_sort_col = col;
					mc_sort_asc = (col === SS_NAME);
				}
				mc_update_sort_indicators();
				mc_sort_and_reorder();
			};
			hrow.appendChild(th);
		}
		thead.appendChild(hrow);
		mc_ss_table.appendChild(thead);

		mc_ss_tbody = document.createElement("tbody");
		mc_ss_table.appendChild(mc_ss_tbody);
		mc_container.appendChild(mc_ss_table);

		statcontentdiv.appendChild(mc_container);
		mc_update_sort_indicators();
	}

	// Update subsystem count in header
	if (mc_ss_header) {
		var arrow = mc_sections.subsystems ? "\u25BC " : "\u25B6 ";
		var new_text = arrow + "\u041F\u043E\u0434\u0441\u0438\u0441\u0442\u0435\u043C\u044B (" + mc_ss_data.length + ")";
		if (mc_ss_header.textContent !== new_text) mc_ss_header.textContent = new_text;
	}

	mc_update_server_section();
	mc_update_ping_section();
	mc_update_key_section();
	mc_update_ss_rows();
}

function iconError() {
	var that = this;
	setTimeout(function() {
		var current_attempts = that.id; // a bit of a hack, change this if we need to call on img id's later
		if(!current_attempts)
			that.id = 1;
		if (current_attempts > imageRetryLimit)
			return;
		var src = that.src;
		that.src = null;
		that.src = src + '#' + current_attempts;
		that.id++;
	}, imageRetryDelay);
}
function draw_listedturf() {
	var statcontent = document.getElementById("statcontent");
	// Ensure persistent table exists and is attached
	if(!turfTable || !turfTable.parentNode) {
		statcontentdiv.textContent = "";
		turfTable = document.createElement("table");
		turfItemNodes = {};
		statcontent.appendChild(turfTable);
	}
	// Build lookup of new items by ref
	var newData = {};
	for(var i = 0; i < turfcontents.length; i++) {
		newData[turfcontents[i][1]] = turfcontents[i];
	}
	// Remove items no longer present
	for(var ref in turfItemNodes) {
		if(!(ref in newData)) {
			turfTable.removeChild(turfItemNodes[ref]);
			delete turfItemNodes[ref];
		}
	}
	// Add new items, update existing, ensure correct order
	var nextSibling = turfTable.firstChild;
	for(var i = 0; i < turfcontents.length; i++) {
		var part = turfcontents[i];
		var ref = part[1];
		if(ref in turfItemNodes) {
			// Existing item — update name if changed, ensure order
			var container = turfItemNodes[ref];
			var linkEl = container.childNodes[1];
			if(linkEl && linkEl.textContent !== part[0]) {
				linkEl.textContent = part[0];
			}
			if(container !== nextSibling) {
				turfTable.insertBefore(container, nextSibling);
			} else {
				nextSibling = nextSibling.nextSibling;
			}
		} else {
			// New item — create container with img + link
			var container = document.createElement("div");
			var img = document.createElement("img");
			if(storedimages[ref] == null && part[2]) {
				img.src = part[2];
				storedimages[ref] = part[2];
			} else if(storedimages[ref]) {
				img.src = storedimages[ref];
			}
			img.onerror = iconError;
			container.appendChild(img);
			var b = document.createElement("div");
			b.className = "link";
			b.onmousedown = function(part) {
				return function(e) {
					e.preventDefault();
					var clickcatcher = "?src=_statpanel_;statpanel_item_target=" + part[1];
					switch(e.button){
						case 1:
							clickcatcher += ";statpanel_item_click=middle";
							break;
						case 2:
							clickcatcher += ";statpanel_item_click=right";
							break;
						default:
							clickcatcher += ";statpanel_item_click=left";
					}
					if(e.shiftKey) clickcatcher += ";statpanel_item_shiftclick=1";
					if(e.ctrlKey) clickcatcher += ";statpanel_item_ctrlclick=1";
					if(e.altKey) clickcatcher += ";statpanel_item_altclick=1";
					byond_topic(clickcatcher);
				};
			}(part);
			b.textContent = part[0];
			container.appendChild(b);
			turfItemNodes[ref] = container;
			turfTable.insertBefore(container, nextSibling);
		}
	}
}

function make_verb_onclick(command) {
	return function() {
		run_after_focus(function() {
			send_byond_command(command);
		});
	};
}

function draw_verbs(cat){
	statcontentdiv.textContent = "";
	var table = document.createElement("div");
	var additions = {}; // additional sub-categories to be rendered
	table.className = "grid-container";
	sortVerbs();
	if (split_admin_tabs && cat.lastIndexOf(".") != -1) {
		var splitName = cat.split(".");
		if (splitName[0] === "Admin")
			cat = splitName[1];
	}
	verbs.reverse(); // sort verbs backwards before we draw
	for (var i = 0; i < verbs.length; ++i) {
		var part = verbs[i];
		var name = part[0];
		if (split_admin_tabs && name.lastIndexOf(".") != -1) {
			var splitName = name.split(".");
			if (splitName[0] === "Admin")
				name = splitName[1];
		}
		var command = part[1];

		if (command && name.lastIndexOf(cat, 0) != -1 && (name.length == cat.length || name.charAt(cat.length) == ".")) {
			var subCat = name.lastIndexOf(".") != -1 ? name.split(".")[1] : null;
			if (subCat && !additions[subCat]) {
				var newTable = document.createElement("div");
				newTable.className = "grid-container";
				additions[subCat] = newTable;
			}

			var a = document.createElement("a");
			a.href = "#"
			a.onclick = make_verb_onclick(command.replace(/\s/g, "-"));
			a.className = "grid-item";
			var t = document.createElement("span");
			t.textContent = command;
			t.className = "grid-item-text";
			a.appendChild(t);
			(subCat ? additions[subCat] : table).appendChild(a);
		}
	}

	// Append base table to view
	var content = document.getElementById("statcontent");
	content.appendChild(table);

	// Append additional sub-categories if relevant
	for (var cat in additions) {
		if (additions.hasOwnProperty(cat)) {
			// do addition here
			var header = document.createElement("h3");
			header.textContent = cat;
			content.appendChild(header);
			content.appendChild(additions[cat]);
		}
	}
}

function set_theme(which) {
	if (which == "light") {
		document.body.className = "";
		set_style_sheet("browserOutput_white");
	} else if (which == "dark") {
		document.body.className = "dark";
		set_style_sheet("browserOutput");
	}
}

function set_style_sheet(sheet) {
	if(document.getElementById("goonStyle")) {
		var currentSheet = document.getElementById("goonStyle");
		currentSheet.parentElement.removeChild(currentSheet);
	}
	var head = document.getElementsByTagName('head')[0];
	var sheetElement = document.createElement("link");
	sheetElement.id = "goonStyle";
	sheetElement.rel = "stylesheet";
	sheetElement.type = "text/css";
	sheetElement.href = sheet + ".css";
	sheetElement.media = 'all';
	head.appendChild(sheetElement);
}

function restoreFocus() {
	if (document.activeElement && document.activeElement.tagName === "INPUT") return;
	run_after_focus(function() {
		byond_winset({ "map.focus": "true" });
	});
}

function getCookie(cname) {
	var name = cname + '=';
	var ca = document.cookie.split(';');
	for(var i=0; i < ca.length; i++) {
	var c = ca[i];
	while (c.charAt(0)==' ') c = c.substring(1);
		if (c.indexOf(name) === 0) {
			return decodeURIComponent(c.substring(name.length,c.length));
		}
	}
	return '';
}
